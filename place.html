<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description"
            content="Explore key data and real-time weather information for Nigeria. Built for WDD 131 - Dynamic Web Fundamentals.">
        <meta name="author" content="Mathew Udowa Oghenemairo">
        <title>Nigeria Data & Weather | WDD 131 | Mathew Udowa Oghenemairo</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles/place.css">
        <script src="scripts/place.js" defer></script>
    </head>

    <body>
        <!-- ======== This is my header ======== -->
        <header>
            <h1>Nigeria</h1>
        </header>
        <!-- ========= This is my main ======== -->
        <main>
            <div class="main-container">
                <picture>
                    <source media="(min-width: 768px)" srcset="images/nigeria-large.webp" type="image/webp">
                    <source media="(min-width: 500px)" srcset="images/nigeria-medium.webp" type="image/webp">
                    <img src="images/nigeria-small.webp" alt="Image of Nigeria landscape with building" width="600"
                        height="363" loading="lazy">
                </picture>
                <section class="data-card card">
                    <h2>Data</h2>
                    <ul class="unordered-list">
                        <li>
                            <span class="label">Area:</span>
                            <span class="value" id="data-value1"></span>
                        </li>
                        <li>
                            <span class="label">Population:</span>
                            <span class="value" id="data-value2"></span>
                        </li>
                        <li>
                            <span class="label">Capital:</span>
                            <span class="value" id="data-value3"></span>
                        </li>
                        <li>
                            <span class="label">Languages:</span>
                            <span class="value" id="data-value4"></span>
                        </li>
                        <li>
                            <span class="label">Currency:</span>
                            <span class="value" id="data-value5"></span>
                        </li>
                        <li>
                            <span class="label">Time Zone:</span>
                            <span class="value" id="data-value6"></span>
                        </li>
                        <li>
                            <span class="label">Calling Code:</span>
                            <span class="value" id="data-value7"></span>
                        </li>
                        <li>
                            <span class="label">Internet TLD:</span>
                            <span class="value" id="data-value8"></span>
                        </li>
                    </ul>
                </section>
                <section class="weather-card card">
                    <h2 class="weather">Weather</h2>
                    <img src="images/cloudy.svg" alt="weather icon" width="80px" height="40px">
                    <ul class="unordered-list">
                        <li>
                            <span class="label">Temperature:</span>
                            <span class="value" id="weather-value1"></span>
                        </li>
                        <li>
                            <span class="label">Condition:</span>
                            <span class="value" id="weather-value2"></span>
                        </li>
                        <li>
                            <span class="label">Wind:</span>
                            <span class="value" id="weather-value3"></span>
                        </li>
                        <li>
                            <span class="label">Wind Chill:</span>
                            <span class="value" id="weather-value4"></span>
                        </li>
                    </ul>
                </section>
            </div>
        </main>
        <!-- ========= This is my footer ======= -->
        <footer>
            <p>&copy; <span id="current-year"></span> 🌴 Mathew | Udowa 🌴 Lagos, Nigeria.</p>
            <p id="lastmodified"></p>
        </footer>
    </body>

</html>
